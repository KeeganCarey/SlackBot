<div style="display:flex;flex-direction:column;gap:10px">

  <!-- User question -->
  <div style="display:flex;justify-content:flex-end">
    <div style="max-width:75%;background:linear-gradient(135deg,#6366f1,#8b5cf6);
                color:white;font-size:13px;padding:12px 16px;
                border-radius:18px 18px 4px 18px;
                box-shadow:0 4px 15px rgba(99,102,241,0.3);line-height:1.5">
      {{ question }}
    </div>
  </div>

  <!-- AI answer -->
  <div style="display:flex;gap:10px;align-items:flex-start;justify-content:flex-start">
    <div style="width:34px;height:34px;border-radius:10px;flex-shrink:0;
                background:linear-gradient(135deg,#1e1b4b,#312e81);
                border:1px solid rgba(167,139,250,0.3);
                display:flex;align-items:center;justify-content:center;font-size:16px">🤖</div>
    <div style="max-width:75%;background:white;border:1px solid #e8ecf4;
                color:#1e293b;font-size:13px;padding:12px 16px;
                border-radius:4px 18px 18px 18px;
                box-shadow:0 2px 12px rgba(0,0,0,0.06);line-height:1.7">
      {{ answer }}
    </div>
  </div>

</div>
