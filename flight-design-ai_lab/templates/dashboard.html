{% extends "base.html" %}
{% set active = "dashboard" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<div
  id="dashboard-content"
  hx-get="/api/dashboard-data"
  hx-trigger="load"
  hx-swap="innerHTML"
  style="display:flex;flex-direction:column;gap:24px">

  <!-- Loading state -->
  <div style="text-align:center;padding:60px 20px">
    <div style="width:56px;height:56px;border-radius:16px;margin:0 auto 16px;
                background:linear-gradient(135deg,#6366f1,#8b5cf6);
                display:flex;align-items:center;justify-content:center;font-size:24px;
                box-shadow:0 6px 20px rgba(99,102,241,0.35);animation:float 2s ease-in-out infinite">🤖</div>
    <p style="font-size:14px;font-weight:600;color:#475569;margin:0">Analysing your business data…</p>
    <p style="font-size:12px;color:#94a3b8;margin:6px 0 0">Gemini AI is reading your schedule, projects and team capacity</p>
  </div>

  <!-- Skeleton cards -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
    {% for _ in range(6) %}
    <div style="border-radius:16px;padding:22px 24px;background:#e2e8f0;
                animation:pulse 1.5s ease-in-out infinite;height:90px"></div>
    {% endfor %}
  </div>

  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  </style>
</div>
{% endblock %}
