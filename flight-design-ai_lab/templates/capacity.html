{% extends "base.html" %}
{% set active = "capacity" %}
{% block title %}Capacity Management{% endblock %}

{% block content %}
<div
  id="capacity-content"
  hx-get="/api/capacity-data"
  hx-trigger="load"
  hx-swap="innerHTML"
  style="display:flex;flex-direction:column;gap:24px">

  <!-- Loading state -->
  <div style="text-align:center;padding:60px 20px">
    <div style="width:56px;height:56px;border-radius:16px;margin:0 auto 16px;
                background:linear-gradient(135deg,#ef4444,#dc2626);
                display:flex;align-items:center;justify-content:center;font-size:24px;
                box-shadow:0 6px 20px rgba(239,68,68,0.35);animation:float 2s ease-in-out infinite">📊</div>
    <p style="font-size:14px;font-weight:600;color:#475569;margin:0">Calculating team capacity…</p>
    <p style="font-size:12px;color:#94a3b8;margin:6px 0 0">Comparing contracted hours against real schedule data</p>
  </div>

  <!-- Skeleton -->
  <div style="background:#e2e8f0;border-radius:16px;height:160px;
              animation:pulse 1.5s ease-in-out infinite"></div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">
    {% for _ in range(4) %}
    <div style="background:#e2e8f0;border-radius:16px;height:180px;
                animation:pulse 1.5s ease-in-out infinite"></div>
    {% endfor %}
  </div>

  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  </style>
</div>
{% endblock %}
