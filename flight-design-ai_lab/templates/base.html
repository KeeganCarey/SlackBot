<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Ops Lab — Flight Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }

    body { background: #f0f2f8; }

    /* Sidebar nav links */
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 10px;
      color: #94a3b8; font-size: 0.875rem; font-weight: 500;
      transition: all 0.18s ease; text-decoration: none;
      position: relative;
    }
    .nav-link:hover { background: rgba(255,255,255,0.07); color: #e2e8f0; }
    .nav-link.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    }
    .nav-link .icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; background: rgba(255,255,255,0.08); flex-shrink: 0;
    }
    .nav-link.active .icon { background: rgba(255,255,255,0.2); }

    /* Stat card base */
    .stat-card {
      border-radius: 16px; padding: 24px;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .stat-card::after {
      content: ''; position: absolute;
      top: -30px; right: -30px;
      width: 100px; height: 100px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    /* Glass card */
    .glass-card {
      background: rgba(255,255,255,0.98);
      border-radius: 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      border: 1px solid rgba(226,232,240,0.8);
    }

    /* HTMX spinner */
    .htmx-indicator { display: none !important; }
    .htmx-request .htmx-indicator { display: flex !important; }
    .htmx-request.htmx-indicator { display: flex !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* Spinner animation */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    /* Pulse skeleton */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .skeleton { animation: pulse 1.5s ease-in-out infinite; background: #e2e8f0; border-radius: 8px; }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- ═══ SIDEBAR ═══════════════════════════════════════════════════════════ -->
  <aside style="width:240px; background:linear-gradient(180deg,#0f172a 0%,#1e1b4b 100%)"
         class="flex flex-col flex-shrink-0 h-full">

    <!-- Brand -->
    <div class="px-5 py-6" style="border-bottom:1px solid rgba(255,255,255,0.07)">
      <div class="flex items-center gap-3 mb-1">
        <div style="width:38px;height:38px;border-radius:10px;
                    background:linear-gradient(135deg,#6366f1,#8b5cf6);
                    display:flex;align-items:center;justify-content:center;
                    box-shadow:0 4px 12px rgba(99,102,241,0.4);font-size:18px">
          🧪
        </div>
        <div>
          <p style="color:#c7d2fe;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase">AI Ops Lab</p>
          <p style="color:#f1f5f9;font-size:12px;font-weight:700;line-height:1.2">Flight Design Studio</p>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-5 flex flex-col gap-1">
      <p style="color:#475569;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:0 14px;margin-bottom:6px">Navigation</p>

      <a href="/dashboard" class="nav-link {% if active == 'dashboard' %}active{% endif %}">
        <span class="icon">🏠</span> Dashboard
      </a>
      <a href="/capacity" class="nav-link {% if active == 'capacity' %}active{% endif %}">
        <span class="icon">📊</span> Capacity
      </a>
      <a href="/chat" class="nav-link {% if active == 'chat' %}active{% endif %}">
        <span class="icon">💬</span> Ask Your Business
      </a>
      <a href="/actions" class="nav-link {% if active == 'actions' %}active{% endif %}">
        <span class="icon">⚡</span> Smart Actions
      </a>
    </nav>

    <!-- Footer -->
    <div class="px-5 py-4" style="border-top:1px solid rgba(255,255,255,0.07)">
      <div class="flex items-center gap-3 mb-3">
        <div style="width:32px;height:32px;border-radius:50%;
                    background:linear-gradient(135deg,#6366f1,#a78bfa);
                    display:flex;align-items:center;justify-content:center;
                    font-size:13px;font-weight:700;color:white">AW</div>
        <div>
          <p style="color:#e2e8f0;font-size:12px;font-weight:600">Ariana Wolf</p>
          <p style="color:#64748b;font-size:10px">Oakland, CA</p>
        </div>
      </div>
      <a href="/reset"
         style="display:flex;align-items:center;gap:6px;color:#64748b;font-size:11px;
                text-decoration:none;transition:color 0.15s"
         onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#64748b'">
        <span>↩</span> Upload new data
      </a>
    </div>
  </aside>

  <!-- ═══ MAIN ══════════════════════════════════════════════════════════════ -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- Header -->
    <header style="background:white;border-bottom:1px solid #e8ecf4;
                   padding:18px 32px;display:flex;align-items:center;
                   justify-content:space-between;flex-shrink:0;
                   box-shadow:0 1px 8px rgba(0,0,0,0.04)">
      <div>
        <h2 style="font-size:1.15rem;font-weight:700;color:#0f172a;margin:0">
          {% block title %}Dashboard{% endblock %}
        </h2>
        <p style="font-size:11px;color:#94a3b8;margin:2px 0 0">
          Flight Design · AI Ops Lab
        </p>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;background:linear-gradient(135deg,#ede9fe,#ddd6fe);
                     color:#7c3aed;border:1px solid #c4b5fd;
                     padding:5px 12px;border-radius:20px;font-weight:600">
          ✦ Gemini AI
        </span>
        <span style="font-size:11px;background:#f0fdf4;color:#16a34a;
                     border:1px solid #bbf7d0;padding:5px 10px;
                     border-radius:20px;font-weight:600">
          ● Live
        </span>
      </div>
    </header>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto" style="padding:28px 32px">
      {% block content %}{% endblock %}
    </div>
  </main>

</body>
</html>
